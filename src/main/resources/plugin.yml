name: SkBridge
version: '1.0'
main: space.ashalinux.skbridge.Main
api-version: '1.13'
author: Ashalinux
depend: [Skript, LuckPerms]

description: |
  ==================================================
                  SkBridge Manual
  ==================================================
  This plugin is a high-performance bridge
  between Skript, LuckPerms, and Votifier.
  It manages Vanilla scoreboard teams absolutely
  ghost-free, sorts them by weight, and
  automatically disables player collision.
  
  --------------------------------------------------
  1. EVENTS (Skript)
  --------------------------------------------------
  - on vote:
      Triggered when a player votes.
      Values: event-string (Name), event-player
  
  - on luckperms group update:
      Triggered in real-time when a player's 
      data changes in LuckPerms.
  
  --------------------------------------------------
  2. EXPRESSIONS (Skript)
  --------------------------------------------------
  - %luckperms prefix of player%
  - %luckperms suffix of player%
  - %luckperms group of player%
  - %luckperms display name of group of player%
  - %luckperms weight of player%
  
  --------------------------------------------------
  3. EFFECTS (Skript)
  --------------------------------------------------
  - set name tag of %player% to %string%
      Sets the tab name, creates the Vanilla team,
      and colors it based on the LP meta "color".
  
  --------------------------------------------------
  4. VALID TEAM COLORS (LP Meta "color")
  --------------------------------------------------
  You can use either the full name or just 
  the number/letter as the value:
  
  DARK_RED (4)       RED (c)          GOLD (6)
  YELLOW (e)         DARK_GREEN (2)   GREEN (a)
  AQUA (b)           DARK_AQUA (3)    DARK_BLUE (1)
  BLUE (9)           LIGHT_PURPLE (d) DARK_PURPLE (5)
  WHITE (f)          GRAY (7)         DARK_GRAY (8)
  BLACK (0)
  ==================================================